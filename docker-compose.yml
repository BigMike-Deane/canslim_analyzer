version: '3.8'

services:
  canslim:
    build:
      context: .
      args:
        VITE_API_TOKEN: ${API_TOKEN:-}
    container_name: canslim-analyzer
    ports:
      - "100.104.189.36:8001:8001"  # Tailscale-only direct access
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
      - backtest-cache:/tmp/backtest_cache
    environment:
      - DEBUG=false
      - FMP_API_KEY=${FMP_API_KEY}
      - CANSLIM_ENV=production
      - DATABASE_URL=postgresql://canslim:${POSTGRES_PASSWORD}@postgres:5432/canslim
      - CANSLIM_WEBHOOK_URL=${CANSLIM_WEBHOOK_URL:-}
      - API_TOKEN=${API_TOKEN:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - REQUIRE_AUTH=${REQUIRE_AUTH:-true}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@canslim.local}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: canslim-postgres
    ports:
      - "100.104.189.36:5432:5432"  # Tailscale-only access for MCP/dev tools
    environment:
      POSTGRES_DB: canslim
      POSTGRES_USER: canslim
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canslim"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: canslim-redis
    # NOTE: Port intentionally NOT exposed to host for security
    # The canslim service connects via Docker internal network using hostname 'redis'
    # If you need local dev access, run Redis natively or use: ports: ["127.0.0.1:6379:6379"]
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: canslim-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - canslim
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  backtest-cache:
  caddy-data:
  caddy-config:
